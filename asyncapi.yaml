asyncapi: 2.6.0

info:
  title: Honey, I'm Back! — Real-time Presence
  description: |
    WebSocket channel that streams live presence updates to connected clients.

    **Connect** to `/ws` to receive the full current presence list immediately.
    The server will then push a fresh list every time any family member arrives
    or leaves (triggered via the REST endpoints documented in `openapi.yaml`).

    **Keepalive**
    The client may send the text message `ping` at any time; the server replies
    with the text message `pong`. Send a ping periodically (e.g. every 30–60s)
    to keep the connection — and the always-on service — from being idled out
    by the hosting provider.

    **Authentication**
    When `API_SECRET` is configured on the server, the connection URL must
    include the secret as a `token` query parameter (WebSocket clients can't
    set request headers, unlike the REST API):
    ```
    wss://<host>/ws?token=<your-secret>
    ```
    A missing or wrong token results in a `401` response and no upgrade.
  version: 1.0.0

servers:
  local:
    url: ws://localhost:8000
    protocol: ws
    description: Local development
    security:
      - TokenQueryParam: []

channels:
  /ws:
    description: |
      Bidirectional channel. The server pushes presence updates; the client
      may send keepalive pings.
    subscribe:
      summary: Messages received from the server
      operationId: receiveFromServer
      message:
        oneOf:
          - $ref: "#/components/messages/AtHomeList"
          - $ref: "#/components/messages/Pong"
    publish:
      summary: Messages sent to the server
      operationId: sendToServer
      message:
        $ref: "#/components/messages/Ping"

components:
  securitySchemes:
    TokenQueryParam:
      type: httpApiKey
      name: token
      in: query
      description: "Pass the server's `API_SECRET` as `?token=<your-secret>` on the connection URL. Only enforced when `API_SECRET` is set on the server."

  messages:
    AtHomeList:
      name: AtHomeList
      title: Members currently at home
      summary: Full list of family members who are currently home.
      description: |
        Sent by the server on connect and after every presence change.
        Always reflects the complete current state — not a delta.
      contentType: application/json
      payload:
        type: array
        items:
          type: string
        description: Names of family members currently at home.
        examples:
          - ["falk", "leni"]
          - []

    Ping:
      name: Ping
      title: Keepalive ping
      summary: Sent by the client to keep the connection alive.
      contentType: text/plain
      payload:
        type: string
        const: ping

    Pong:
      name: Pong
      title: Keepalive pong
      summary: Server's reply to a ping.
      contentType: text/plain
      payload:
        type: string
        const: pong
